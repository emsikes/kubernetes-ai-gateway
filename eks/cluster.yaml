apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ai-gateway
  region: us-west-2
  version: "1.31"

managedNodeGroups:
  - name: workers
    instanceType: t3.medium
    desiredCapacity: 3
    minSize: 2
    maxSize: 4
    volumeSize: 30
    ssh:
      allow: false
    iam:
      withAddonPolicies:
        ebs: true